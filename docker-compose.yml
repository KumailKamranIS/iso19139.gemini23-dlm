services:
  elasticsearch:
    restart: unless-stopped
    image: elasticsearch:7.17.15
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      network.host: 0.0.0.0
    ports:
      - "9200:9200"
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=50s" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  geonetwork:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      WEBAPP_CONTEXT_PATH: /geonetwork
      ES_HOST: elasticsearch
      ES_PORT: 9200
      ES_PROTOCOL: http
      JAVA_OPTS: -Xms512m -Xmx1024m -Des.host=elasticsearch -Des.port=9200 -Des.protocol=http
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/geonetwork/srv/api/site || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30

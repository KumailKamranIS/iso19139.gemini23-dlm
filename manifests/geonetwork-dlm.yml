apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geonetwork-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geonetwork-dlm-deployment
  labels:
    app: geonetwork-dlm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geonetwork-dlm
  template:
    metadata:
      labels:
        app: geonetwork-dlm
    spec:
      containers:
      - name: geonetwork-dlm
        resources: {}
        image: geonetwork-dlm:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /geonetwork/criticalhealthcheck
            port: 8080
          initialDelaySeconds: 30 # usually takes about 30 seconds for app to start, somtimes more.
          periodSeconds: 10
          failureThreshold: 4
        ports:
        - containerPort: 8080



        env:
        - name: WEBAPP_CONTEXT_PATH
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: WEBAPP_CONTEXT_PATH

        - name: JAVA_OPTS
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: JAVA_OPTS

        - name: ES_HOST
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: ES_HOST

        - name: ES_PORT
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: ES_PORT


        - name: ES_PROTOCOL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: ES_PROTOCOL

        - name: GEONETWORK_DB_TYPE
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_TYPE

        - name: GEONETWORK_DB_HOST
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_HOST              

        - name: GEONETWORK_DB_PORT
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_PORT 

        - name: GEONETWORK_DB_NAME
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_NAME 

        - name: GEONETWORK_DB_USERNAME
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_USERNAME 

        - name: GEONETWORK_DB_PASSWORD
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_PASSWORD 

        volumeMounts:
        - name: geonetwork-data
          mountPath: /opt/geonetwork/WEB-INF/data
      volumes:
      - name: geonetwork-data
        persistentVolumeClaim:
          claimName: geonetwork-data

---
apiVersion: v1
kind: Service
metadata:
  name: geonetwork-dlm-service
spec:
  type: NodePort
  selector:
    app: geonetwork-dlm
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30100

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geonetwork-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geonetwork-dlm-deployment
  labels:
    app: geonetwork-dlm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geonetwork-dlm
  template:
    metadata:
      labels:
        app: geonetwork-dlm
    spec:
      containers:
      - name: geonetwork-dlm
        resources: {}
        image: geonetwork-dlm:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /geonetwork/srv/eng/catalog.search#/home # Do not use /geonetwork/criticalhealthcheck
            port: 8080
          initialDelaySeconds: 60 # geonetwork needs a while
          periodSeconds: 10
          failureThreshold: 4
        readinessProbe:
          httpGet:
            path: /geonetwork/srv/eng/catalog.search#/home
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10

        ports:
        - containerPort: 8080
        env:
        - name: WEBAPP_CONTEXT_PATH
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: WEBAPP_CONTEXT_PATH

        - name: JAVA_OPTS
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: JAVA_OPTS

        - name: ES_HOST
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: ES_HOST

        - name: ES_PORT
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: ES_PORT


        - name: ES_PROTOCOL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: ES_PROTOCOL

        - name: GEONETWORK_DB_TYPE
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_TYPE

        - name: GEONETWORK_DB_HOST
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_HOST              

        - name: GEONETWORK_DB_PORT
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_PORT 

        - name: GEONETWORK_DB_NAME
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GEONETWORK_DB_NAME 

        - name: GEONETWORK_DB_USERNAME
          valueFrom: 
            secretKeyRef:
              name: geonetwork-secrets
              key: POSTGRES_USER

        - name: GEONETWORK_DB_PASSWORD
          valueFrom: 
            secretKeyRef:
              name: geonetwork-secrets
              key: POSTGRES_PASSWORD

        volumeMounts:
        - name: geonetwork-data
          mountPath: /var/lib/jetty/webapps/geonetwork/WEB-INF/data/data/metadata_data # Used to store thumbnails + file attachments
      volumes:
      - name: geonetwork-data
        persistentVolumeClaim:
          claimName: geonetwork-data

---
apiVersion: v1
kind: Service
metadata:
  name: geonetwork-dlm-service
spec:
  type: NodePort
  selector:
    app: geonetwork-dlm
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30100

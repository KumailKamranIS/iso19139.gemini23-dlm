apiVersion: apps/v1
kind: Deployment
metadata:
  name: ogc-records-api-deployment
  labels:
    app: ogc-records-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ogc-records-api
  template:
    metadata:
      labels:
        app: ogc-records-api
    spec:
      containers:
      - name: ogc-records-api
        image: geonetwork/gn-cloud-ogc-api-records-service:4.2.9-0
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_DATASOURCE_URL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SPRING_DATASOURCE_PASSWORD
        - name: GN_BASEURL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GN_BASEURL
        - name: GN_LEGACY_URL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GN_LEGACY_URL
        - name: GN_INDEX_URL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GN_INDEX_URL
        - name: SERVER_FORWARDHEADERSSTRATEGY
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SERVER_FORWARDHEADERSSTRATEGY

        - name: JAVA_OPTS
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: OGC_RECORDS_API_JAVA_OPTS
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 8080
        #     httpHeaders:
        #     - name: Custom-Header
        #       value: Awesome
        #   initialDelaySeconds: 3
        #   periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ogc-records-api-service
spec:
  type: NodePort
  selector:
    app: ogc-records-api
  ports:
    - protocol: TCP
      port: 9201
      targetPort: 8080
      nodePort: 30200
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ogc-records-api-deployment
  labels:
    app: ogc-records-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ogc-records-api
  template:
    metadata:
      labels:
        app: ogc-records-api
    spec:
      containers:
      - name: ogc-records-api
        resources: 
          requests:
            cpu: "0.5"
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
        image: geonetwork/gn-cloud-ogc-api-records-service:4.2.9-0
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 3
          failureThreshold: 4
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_DATASOURCE_URL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SPRING_DATASOURCE_URL

        - name: SPRING_DATASOURCE_USERNAME
          valueFrom: 
            secretKeyRef:
              name: geonetwork-secrets
              key: POSTGRES_USER

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom: 
            secretKeyRef:
              name: geonetwork-secrets
              key: POSTGRES_PASSWORD
        - name: GN_BASEURL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GN_BASEURL
        - name: GN_LEGACY_URL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GN_LEGACY_URL
        - name: GN_INDEX_URL
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: GN_INDEX_URL
        - name: SERVER_FORWARDHEADERSSTRATEGY
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: SERVER_FORWARDHEADERSSTRATEGY

        - name: JAVA_OPTS
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: OGC_RECORDS_API_JAVA_OPTS

---
apiVersion: v1
kind: Service
metadata:
  name: ogc-records-api-service
spec:
  type: NodePort
  selector:
    app: ogc-records-api
  ports:
    - protocol: TCP
      port: 9201
      targetPort: 8080
      nodePort: 30200
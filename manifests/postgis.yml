apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgis-deployment
  labels:
    app: postgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgis
  template:
    metadata:
      labels:
        app: postgis
    spec:
      containers:
      - name: postgis
        image: postgis/postgis:11-2.5
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: POSTGRES_PASSWORD

        - name: POSTGRES_DB
          valueFrom: 
            configMapKeyRef:
              name: geonetwork-config
              key: POSTGRES_DB
---
apiVersion: v1
kind: Service
metadata:
  name: postgis-service
spec:
  selector:
    app: postgis
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
